<!DOCTYPE html>
<html>
<body>
<canvas id="myCanvas" width="200" height="200" style="border:1px solid #000000;"></canvas>
<script>
var c = document.getElementById("myCanvas");
var ctx = c.getContext("2d");
var width = 200;
var height = 200;

ctx.beginPath();
ctx.moveTo(width / 2, height * 0.25);
ctx.bezierCurveTo(
    width * 0.05, -height * 0.05,
    0, height * 0.5,
    width / 2, height * 0.95
);
ctx.bezierCurveTo(
    width, height * 0.5,
    width * 0.95, -height * 0.05,
    width / 2, height * 0.25
);
ctx.fillStyle = "red";
ctx.fill();
</script>
</body>
</html>
