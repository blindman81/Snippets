<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Video Frame Inspector</title>
  <style>
    :root {
      color-scheme: dark;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
      color: #fff;
      font: 16px/1.4 system-ui, sans-serif;
    }
    canvas {
      max-width: 100vw;
      max-height: 100vh;
      display: block;
    }
    #status {
      position: fixed;
      left: 12px;
      bottom: 12px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.6);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <video id="video" playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="status">Loading…</div>
  <script>
    const params = new URLSearchParams(location.search);
    const src = params.get("src");
    const time = Number(params.get("t") || "0");
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const status = document.getElementById("status");

    if (!src) {
      status.textContent = "Missing src";
      throw new Error("Missing src");
    }

    const renderFrame = () => {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const context = canvas.getContext("2d");
      context.drawImage(video, 0, 0, canvas.width, canvas.height);
      video.style.display = "none";
      status.textContent = `Rendered ${time.toFixed(2)}s`;
      document.body.dataset.ready = "true";
    };

    video.addEventListener("loadedmetadata", () => {
      status.textContent = `Seeking ${time.toFixed(2)}s`;
      video.currentTime = Math.min(Math.max(time, 0), Math.max(video.duration - 0.05, 0));
    }, { once: true });

    video.addEventListener("seeked", renderFrame, { once: true });
    video.addEventListener("error", () => {
      status.textContent = "Video error";
      document.body.dataset.ready = "error";
    }, { once: true });

    video.src = src;
  </script>
</body>
</html>
